name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: black --check --diff .

      - name: Check import order (isort)
        run: isort --check-only --diff .

      - name: Lint (flake8)
        run: flake8 . --max-line-length=120 --exclude=venv,dist,build,__pycache__

  type-check:
    name: Type Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install mypy
        run: pip install mypy boto3-stubs[s3] types-requests pandas-stubs

      - name: Run mypy
        run: mypy . --ignore-missing-imports --no-strict-optional --exclude venv
        continue-on-error: true  # non-blocking until type coverage improves

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --desc on
        continue-on-error: true  # report findings; don't block on low severity
